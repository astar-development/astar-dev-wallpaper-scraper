name: Release

# Pushing a semver tag (e.g. v0.2.0) publishes self-contained Velopack packages
# for linux-x64 and win-x64 to a GitHub Release. The app's UpdateService reads
# the same release feed to offer in-app updates.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    name: Pack and release ${{ matrix.rid }}
    strategy:
      # vpk upload creates/updates the GitHub release; serialise the jobs so
      # both runtimes attach to the same release without racing.
      max-parallel: 1
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            mainExe: AStar.Dev.Wallpaper.Scraper
            icon: AStar.Dev.Wallpaper.Scraper/Assets/astar.png
          - os: windows-latest
            rid: win-x64
            mainExe: AStar.Dev.Wallpaper.Scraper.exe
            icon: AStar.Dev.Wallpaper.Scraper/Assets/astar.ico
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Derive version from tag
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Publish self-contained
        shell: bash
        run: >
          dotnet publish AStar.Dev.Wallpaper.Scraper/AStar.Dev.Wallpaper.Scraper.csproj
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained
          -p:Version=$VERSION
          --output publish

      - name: Install vpk
        run: dotnet tool install --global vpk

      - name: Download previous release packages (enables delta updates)
        shell: bash
        run: >
          vpk download github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          || echo "No previous release found - building full package only"

      - name: Pack
        shell: bash
        run: >
          vpk pack
          --packId AStar.Dev.Wallpaper.Scraper
          --packVersion $VERSION
          --packDir publish
          --mainExe ${{ matrix.mainExe }}
          --packTitle "AStar Dev Wallpaper Scraper"
          --icon ${{ matrix.icon }}

      - name: Upload to GitHub Release
        shell: bash
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --publish
          --merge
          --releaseName "v$VERSION"
          --tag $GITHUB_REF_NAME
