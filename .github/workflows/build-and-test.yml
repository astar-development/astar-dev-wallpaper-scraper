name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build, test and report coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      # global.json pins the test runner to Microsoft.Testing.Platform (MTP v2),
      # so `dotnet test` runs the MTP executables directly. The coverage flags
      # come from Microsoft.Testing.Extensions.CodeCoverage, referenced by every
      # test project via Directory.Build.props.
      #
      # No --coverage-output filename: each test module then writes a uniquely
      # named <guid>.cobertura.xml, so parallel modules cannot overwrite each
      # other. --results-directory collects them in one predictable folder
      # regardless of SDK patch version (10.0.1xx and 10.0.3xx default to
      # different locations).
      - name: Test with coverage
        run: >
          dotnet test
          --configuration Release
          --no-build
          --coverage
          --coverage-output-format cobertura
          --results-directory ./TestResults

      - name: Generate coverage report
        uses: danielpalme/ReportGenerator-GitHub-Action@v5.5.9
        with:
          reports: "TestResults/*.cobertura.xml"
          targetdir: coveragereport
          reporttypes: "HtmlInline;Cobertura;MarkdownSummaryGithub"

      - name: Publish coverage to job summary
        run: cat coveragereport/SummaryGithub.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coveragereport
