
name: Bug Report
description: Report a reproducible bug
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug!
  - type: input
    id: area
    attributes:
      label: Affected Project
      description: Which app, library or component is affected?
      placeholder: libs/MyLibrary or apps/MyApp
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to Reproduce
      description: Please include reproducible steps.
      placeholder: |
        1. Do X
        2. Do Y
        3. Observe failure
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
  - type: textarea
    id: logs
    attributes:
      label: Logs / Stacktrace
      render: shell
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - minor
        - major
        - critical
    validations:
      required: true
